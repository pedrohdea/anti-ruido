name: Deploy do site → Cloudflare Pages

# Publica o site estático de captação de interesse (site/) no Cloudflare Pages.
# Mesmo padrão do workflow de deploy do repo rpg-de-mesa (comprovado):
# o projeto Pages "anti-ruido" é criado automaticamente no 1º deploy
# (Direct Upload) — não precisa criar nada no dashboard antes.
#
# Requer 2 secrets no repositório (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token com permissão "Cloudflare Pages: Edit"
#   CLOUDFLARE_ACCOUNT_ID  — ID da conta (Cloudflare dashboard → Workers & Pages)
# (Podem ser os mesmos valores já usados no repo rpg-de-mesa.)

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy no Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::Secrets CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID ausentes — pulando deploy."
            exit 0
          fi
          # cria o projeto na 1ª vez (ignora erro se já existe)
          npx wrangler@3 pages project create anti-ruido \
            --production-branch=main 2>/dev/null || true
          npx wrangler@3 pages deploy site \
            --project-name=anti-ruido --branch=main | tee deploy.log
          URL=$(grep -oE 'https://[a-z0-9.-]+\.pages\.dev' deploy.log | head -1)
          echo "### 🚀 Site publicado" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "Produção: https://anti-ruido.pages.dev" >> "$GITHUB_STEP_SUMMARY"
